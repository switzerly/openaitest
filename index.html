<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatGPT Mini App</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем скрипт Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <div class="status-dot"></div>
            <h1>ChatGPT Active Chat</h1>
        </header>

        <div id="chat-container">
            <div class="message bot">
                Привет! Я твой AI-ассистент. Чем могу помочь?
                <span class="time">12:00</span>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Напишите сообщение..." autocomplete="off">
            <button id="send-btn">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
